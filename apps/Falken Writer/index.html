<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Falken Writer es un editor de texto retro para iPad y Mac con biblioteca, iCloud, Markdown, RTF, exportación PDF y estética de terminal clásica.">
    <title>Falken Writer | Editor retro Markdown y RTF para iPad y Mac</title>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
                    },
                    boxShadow: {
                        soft: '0 24px 80px rgba(15, 23, 42, 0.08)',
                    }
                }
            }
        }
    </script>
    <style>
        [data-cloak] {
            display: none !important;
        }

        body {
            background-color: #070a12;
            color: #f1f5f9;
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#070a12] font-sans text-slate-100 antialiased" data-cloak>
    <header class="sticky top-0 z-50 border-b border-slate-800/80 bg-[#070a12]/85 backdrop-blur-xl">
        <nav class="mx-auto flex max-w-6xl items-center justify-between px-5 py-4 sm:px-6 lg:px-8">
            <a href="../../index.html" class="flex items-center gap-3">
                <span class="text-lg font-bold tracking-tight text-white sm:text-xl">Takatoke Factory</span>
            </a>

            <div class="grid grid-cols-2 rounded-full border border-slate-700 bg-slate-900 p-1 text-xs font-semibold" aria-label="Selector de idioma">
                <button type="button" class="language-button rounded-full px-3 py-1.5 transition" data-lang="es">ES</button>
                <button type="button" class="language-button rounded-full px-3 py-1.5 transition" data-lang="en">EN</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="mx-auto grid max-w-6xl gap-12 px-5 py-16 sm:px-6 sm:py-20 lg:grid-cols-[0.9fr_1.1fr] lg:px-8">
            <div class="rounded-2xl bg-white p-6 text-slate-950 shadow-sm sm:p-8">
                <div id="app-icon" class="flex h-24 w-24 items-center justify-center rounded-2xl bg-gradient-to-br from-slate-950 to-slate-600 text-white shadow-sm">
                    <i data-lucide="app-window" class="h-10 w-10"></i>
                </div>

                <p id="app-platforms" class="mt-8 text-sm font-semibold uppercase tracking-[0.2em] text-slate-500"></p>
                <h1 id="app-title" class="mt-3 text-5xl font-semibold tracking-tight text-slate-950 sm:text-6xl"></h1>
                <p id="app-description" class="mt-6 whitespace-pre-line text-lg leading-8 text-slate-600"></p>

                <div id="app-tags" class="mt-7 flex flex-wrap gap-2"></div>
                <div id="store-buttons" class="mt-8 flex flex-col gap-3 sm:flex-row sm:flex-wrap"></div>
            </div>

            <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4 shadow-sm">
                <div id="platform-tabs" class="mb-4 flex flex-wrap gap-2"></div>
                <div id="screenshots" class="grid gap-4 sm:grid-cols-2"></div>
            </div>
        </section>
    </main>

    <footer class="border-t border-slate-800 bg-[#070a12] py-8 text-center text-sm text-slate-400">
        &copy; 2026 Takatoke Factory. <span data-i18n="rights">Todos los derechos reservados.</span>
    </footer>

    <div id="image-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-slate-950/80 p-4 backdrop-blur-xl sm:p-8" role="dialog" aria-modal="true" aria-label="Captura ampliada">
        <button type="button" id="modal-close" class="absolute right-4 top-4 inline-flex h-11 w-11 items-center justify-center rounded-full bg-white/95 text-slate-950 shadow-sm transition hover:bg-white" aria-label="Cerrar">
            <i data-lucide="x" class="h-5 w-5"></i>
        </button>
        <div class="flex max-h-[92vh] w-full max-w-7xl items-center justify-center">
            <img id="modal-image" src="" alt="" class="max-h-[92vh] max-w-full rounded-2xl bg-white object-contain shadow-soft">
        </div>
    </div>

    <script>
        /*
            Cuando dupliques esta carpeta, cambia estos datos para que coincidan con app.json.
            Si prefieres, cambia solo app.json y dime que sincronice las apps.
        */
        const APP = {
            slug: 'falken-writer',
            title: {
                es: 'Falken Writer',
                en: 'Falken Writer'
            },
            subtitle: {
                es: 'iPadOS y macOS',
                en: 'iPadOS and macOS'
            },
            description: {
                es: `Falken Writer es un editor de texto para iPad y Mac con una estética retro inspirada en terminales clásicas, diseñado para escribir, organizar y revisar documentos sin distracciones.

Falken Writer es completamente funcional gratis con el estilo Fósforo Verde; la compra in-app solo desbloquea estilos visuales retro adicionales.

Incluye una biblioteca integrada con sincronización mediante iCloud Drive, apertura de archivos externos desde Archivos/Finder, guardado local, historial de versiones, etiquetas, favoritos, búsqueda, autoguardado configurable y soporte para documentos en TXT, Markdown, LOG, RTF, HTML y CSV.

El editor permite trabajar con texto plano o enriquecido, aplicar estilos rápidos, negrita, cursiva, tachado, alineación, tamaño de fuente y sangrías visuales con regla y controles precisos. También permite exportar documentos a PDF.

La interfaz combina funcionalidad moderna con una identidad visual táctica y analógica: verde fósforo sobre negro como perfil gratuito, paneles tipo terminal, telemetría del documento y una experiencia sobria enfocada en la escritura.

Falken Writer está pensado para quienes quieren un editor diferente: minimalista, funcional, compatible con iPad y Mac, y con una personalidad visual propia.`,
                en: `Falken Writer is a text editor for iPad and Mac with a retro terminal-inspired aesthetic, designed for focused writing, document organization, and distraction-free editing.

Falken Writer is fully functional for free with the Phosphor Green style; the in-app purchase only unlocks additional retro visual styles.

It includes an integrated document library with iCloud Drive sync, external file opening from Files/Finder, local saving, version history, tags, favorites, search, configurable autosave, and support for TXT, Markdown, LOG, RTF, HTML, and CSV documents.

The editor supports both plain text and rich text workflows, with quick styles, bold, italic, strikethrough, alignment, font size controls, and visual indentation using a ruler and precise manual settings. Documents can also be exported to PDF.

The interface combines modern writing tools with a tactical analog identity: phosphor green on black as the free default profile, terminal-style panels, document telemetry, and a sober environment focused on writing.

Falken Writer is built for users who want a different kind of editor: minimal, functional, compatible with iPad and Mac, and defined by a distinctive visual personality.`
            },
            platforms: ['ipados', 'macos'],
            tags: {
                es: ['Productividad', 'Retro', 'Editor', 'Terminal', 'Código'],
                en: ['Productivity', 'Retro', 'Editor', 'Terminal', 'Code']
            },
            icon: 'icon.png',
            links: {
                appStore: 'https://apps.apple.com/us/app/falken-writer/id6768220346',
                macAppStore: 'https://apps.apple.com/us/app/falken-writer/id6768220346'
            },
            screenshots: {
                ipados: {
                    es: [
                        'ipados/es/01.png',
                        'ipados/es/02.png',
                        'ipados/es/03.png',
                        'ipados/es/04.png',
                        'ipados/es/05.png',
                        'ipados/es/06.png',
                        'ipados/es/07.png'
                    ],
                    en: [
                        'ipados/en/01.png',
                        'ipados/en/02.png',
                        'ipados/en/03.png',
                        'ipados/en/04.png',
                        'ipados/en/05.png',
                        'ipados/en/06.png',
                        'ipados/en/07.png',
                        'ipados/en/08.png',
                        'ipados/en/09.png',
                        'ipados/en/10.png',
                        'ipados/en/11.png',
                        'ipados/en/12.png'
                    ]
                },
                macos: {
                    es: [
                        'macos/es/01.png',
                        'macos/es/02.png',
                        'macos/es/03.png',
                        'macos/es/04.png'
                    ],
                    en: [
                        'macos/en/01.png',
                        'macos/en/02.png',
                        'macos/en/03.png',
                        'macos/en/04.png',
                        'macos/en/05.png',
                        'macos/en/06.png',
                        'macos/en/07.png',
                        'macos/en/08.png'
                    ]
                }
            }
        };

        const COPY = {
            es: {
                screenshot: 'Captura',
                rights: 'Todos los derechos reservados.'
            },
            en: {
                screenshot: 'Screenshot',
                rights: 'All rights reserved.'
            }
        };

        const platformLabel = {
            ios: 'iOS',
            ipados: 'iPadOS',
            macos: 'macOS'
        };

        let currentPlatform = APP.platforms[0];

        const getSavedLanguage = () => {
            const saved = localStorage.getItem('takatoke-language');
            return ['es', 'en'].includes(saved) ? saved : 'es';
        };

        const getText = (value, lang) => value?.[lang] || value?.es || value?.en || '';

        const renderStoreButtons = (lang) => {
            const buttons = [];

            if (APP.links.appStore) {
                buttons.push(`
                    <a href="${APP.links.appStore}" class="inline-flex transition hover:-translate-y-0.5" aria-label="App Store - ${getText(APP.title, lang)}">
                        <img src="../../Download_App_${lang.toUpperCase()}.svg" alt="App Store" class="h-14 w-auto">
                    </a>
                `);
            }

            if (APP.links.macAppStore) {
                buttons.push(`
                    <a href="${APP.links.macAppStore}" class="inline-flex transition hover:-translate-y-0.5" aria-label="Mac App Store - ${getText(APP.title, lang)}">
                        <img src="../../Download_Mac_${lang.toUpperCase()}.svg" alt="Mac App Store" class="h-14 w-auto">
                    </a>
                `);
            }

            document.querySelector('#store-buttons').innerHTML = buttons.join('');
        };

        const renderScreenshots = (lang) => {
            const shots = APP.screenshots[currentPlatform]?.[lang] || [];
            const screenshots = shots.length > 0 ? shots : ['', '', '', ''];

            document.querySelector('#screenshots').innerHTML = screenshots.map((src, index) => {
                if (src) {
                    return `
                        <button type="button" class="screenshot-button group block overflow-hidden rounded-2xl border border-slate-200 bg-white text-left shadow-sm transition hover:-translate-y-0.5 hover:shadow-soft" data-src="${src}" data-alt="${COPY[lang].screenshot} ${index + 1}">
                            <img src="${src}" alt="${COPY[lang].screenshot} ${index + 1}" class="h-full min-h-[280px] w-full object-cover transition duration-300 group-hover:scale-[1.02]">
                        </button>
                    `;
                }

                return `<div class="flex min-h-[280px] items-center justify-center rounded-2xl border border-slate-200 bg-white text-sm font-medium text-slate-400">${COPY[lang].screenshot} ${index + 1}</div>`;
            }).join('');

            document.querySelectorAll('.screenshot-button').forEach((button) => {
                button.addEventListener('click', () => openImageModal(button.dataset.src, button.dataset.alt));
            });
        };

        const openImageModal = (src, alt) => {
            const modal = document.querySelector('#image-modal');
            const image = document.querySelector('#modal-image');

            image.src = src;
            image.alt = alt;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.classList.add('overflow-hidden');
        };

        const closeImageModal = () => {
            const modal = document.querySelector('#image-modal');
            const image = document.querySelector('#modal-image');

            modal.classList.add('hidden');
            modal.classList.remove('flex');
            image.src = '';
            document.body.classList.remove('overflow-hidden');
        };

        document.querySelector('#modal-close').addEventListener('click', closeImageModal);
        document.querySelector('#image-modal').addEventListener('click', (event) => {
            if (event.target.id === 'image-modal') closeImageModal();
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') closeImageModal();
        });

        const renderPlatformTabs = (lang) => {
            document.querySelector('#platform-tabs').innerHTML = APP.platforms.map((platform) => `
                <button type="button" class="platform-button rounded-full px-4 py-2 text-sm font-semibold transition ${platform === currentPlatform ? 'bg-slate-950 text-white' : 'bg-white text-slate-600 hover:bg-slate-100'}" data-platform="${platform}">
                    ${platformLabel[platform]}
                </button>
            `).join('');

            document.querySelectorAll('.platform-button').forEach((button) => {
                button.addEventListener('click', () => {
                    currentPlatform = button.dataset.platform;
                    applyLanguage(lang);
                });
            });
        };

        const applyLanguage = (lang) => {
            document.documentElement.lang = lang;
            localStorage.setItem('takatoke-language', lang);
            document.title = `${getText(APP.title, lang)} | Takatoke Factory`;

            document.querySelector('#app-title').textContent = getText(APP.title, lang);
            document.querySelector('#app-platforms').textContent = getText(APP.subtitle, lang);
            document.querySelector('#app-description').textContent = getText(APP.description, lang);
            document.querySelector('#app-tags').innerHTML = APP.tags[lang].map((tag) => `<span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-600">${tag}</span>`).join('');
            document.querySelector('[data-i18n="rights"]').textContent = COPY[lang].rights;

            if (APP.icon) {
                document.querySelector('#app-icon').outerHTML = `<img id="app-icon" src="${APP.icon}" alt="" class="h-24 w-24 rounded-2xl object-cover shadow-sm">`;
            }

            document.querySelectorAll('.language-button').forEach((button) => {
                const isActive = button.dataset.lang === lang;
                button.classList.toggle('bg-white', isActive);
                button.classList.toggle('text-slate-950', isActive);
                button.classList.toggle('shadow-sm', isActive);
                button.classList.toggle('text-slate-500', !isActive);
            });

            renderStoreButtons(lang);
            renderPlatformTabs(lang);
            renderScreenshots(lang);
            lucide.createIcons();
            document.body.removeAttribute('data-cloak');
        };

        document.querySelectorAll('.language-button').forEach((button) => {
            button.addEventListener('click', () => applyLanguage(button.dataset.lang));
        });

        applyLanguage(getSavedLanguage());
    </script>
</body>
</html>
