<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takatoke Factory | App Development</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <!-- Header -->
    <header class="py-10 text-center">
        <h1 class="text-4xl font-extrabold tracking-tight text-indigo-600">Takatoke Factory</h1>
        <p class="mt-2 text-lg text-gray-600">Creando experiencias digitales únicas.</p>
    </header>

    <!-- App Section -->
    <main class="max-w-5xl mx-auto px-4 py-12">
        <h2 class="text-2xl font-bold mb-8 border-b pb-2">Nuestras Apps</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Tarjeta de App 1 (Copia este bloque para nuevas apps) -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition">
                <div class="flex items-center mb-4">
                    <div class="w-16 h-16 bg-indigo-100 rounded-2xl mr-4 flex items-center justify-center font-bold text-indigo-500">LOGO</div>
                    <div>
                        <h3 class="text-xl font-bold">Nombre de tu App</h3>
                        <p class="text-sm text-gray-500">iOS & macOS</p>
                    </div>
                </div>
                <p class="text-gray-600 mb-6">Aquí va una descripción breve y atractiva de lo que hace tu aplicación maravillosa.</p>
                <a href="#" class="inline-block bg-black text-white px-6 py-2 rounded-full text-sm font-medium hover:bg-gray-800 transition">
                    Ver en App Store
                </a>
            </div>
        </div>
    </main>

    <footer class="py-10 text-center text-gray-400 text-xs">
        &copy; 2026 Takatoke Factory. Todos los derechos reservados.
    </footer>

</body>
</html>
