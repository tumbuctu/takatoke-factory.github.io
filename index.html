<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Takatoke Factory desarrolla apps cuidadas para iOS y macOS. Portfolio de aplicaciones, productos y experiencias digitales.">
    <title>Takatoke Factory | Apps for iOS & macOS</title>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
                    },
                    boxShadow: {
                        soft: '0 24px 80px rgba(15, 23, 42, 0.08)',
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-white font-sans text-slate-950 antialiased">

    <!-- Header / Navigation -->
    <header class="sticky top-0 z-50 border-b border-slate-200/70 bg-white/85 backdrop-blur-xl">
        <nav class="mx-auto flex max-w-6xl items-center justify-between px-5 py-4 sm:px-6 lg:px-8" aria-label="Navegación principal">
            <a href="#" class="flex items-center gap-3" aria-label="Takatoke Factory inicio">
                <span class="text-sm font-semibold tracking-tight sm:text-base">Takatoke Factory</span>
            </a>

            <div class="flex items-center gap-4">
                <div class="hidden items-center gap-7 text-sm font-medium text-slate-600 sm:flex">
                    <a href="#portfolio" class="transition hover:text-slate-950" data-i18n="navPortfolio">Portfolio</a>
                    <a href="mailto:takatokefactory@gmail.com" class="transition hover:text-slate-950" data-i18n="navContact">Contacto</a>
                </div>

                <!-- Language selector -->
                <div class="grid grid-cols-2 rounded-full border border-slate-200 bg-slate-100 p-1 text-xs font-semibold" aria-label="Selector de idioma">
                    <button type="button" class="language-button rounded-full px-3 py-1.5 transition" data-lang="es">ES</button>
                    <button type="button" class="language-button rounded-full px-3 py-1.5 transition" data-lang="en">EN</button>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <!-- Portfolio -->
        <section id="portfolio" class="bg-slate-50 py-16 sm:py-20">
            <div class="mx-auto max-w-6xl px-5 sm:px-6 lg:px-8">
                <div class="max-w-2xl">
                    <p class="text-sm font-semibold uppercase tracking-[0.2em] text-slate-500">Portfolio</p>
                    <h2 class="mt-3 text-3xl font-semibold tracking-tight text-slate-950 sm:text-5xl" data-i18n="portfolioTitle">Apps publicadas.</h2>
                </div>

                <!-- Las tarjetas se crean desde el bloque APPS del script final. -->
                <div id="portfolio-grid" class="mt-12 grid gap-8"></div>
            </div>
        </section>

        <!-- Contact -->
        <section id="contacto" class="bg-white py-16">
            <div class="mx-auto flex max-w-6xl flex-col items-start justify-between gap-6 px-5 sm:px-6 md:flex-row md:items-center lg:px-8">
                <div>
                    <h2 class="text-2xl font-semibold tracking-tight text-slate-950" data-i18n="contactTitle">Construyamos algo cuidado.</h2>
                    <p class="mt-2 text-slate-600" data-i18n="contactDescription">Añade aquí tu email, redes o enlace de contacto cuando quieras publicarlo.</p>
                </div>
                <a href="mailto:takatokefactory@gmail.com" class="inline-flex items-center justify-center gap-2 rounded-full bg-slate-950 px-6 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">
                    <i data-lucide="mail" class="h-4 w-4"></i>
                    takatokefactory@gmail.com
                </a>
            </div>
        </section>
    </main>

    <footer class="border-t border-slate-200 bg-white py-8 text-center text-sm text-slate-500">
        &copy; 2026 Takatoke Factory. <span data-i18n="footerRights">Todos los derechos reservados.</span>
    </footer>

    <script>
        const LANGUAGES = ['es', 'en'];

        const COPY = {
            es: {
                navPortfolio: 'Portfolio',
                navContact: 'Contacto',
                portfolioTitle: 'Apps publicadas.',
                contactTitle: 'Construyamos algo cuidado.',
                contactDescription: 'Escríbenos si quieres hablar de una app, una colaboración o una idea en desarrollo.',
                footerRights: 'Todos los derechos reservados.',
                details: 'Ver detalles',
                appStoreSmall: 'Download on the',
                appStore: 'App Store',
                macAppStore: 'Mac App Store',
                screenshot: 'Captura',
            },
            en: {
                navPortfolio: 'Portfolio',
                navContact: 'Contact',
                portfolioTitle: 'Published apps.',
                contactTitle: 'Let’s build something polished.',
                contactDescription: 'Write to us if you want to talk about an app, a collaboration or an idea in progress.',
                footerRights: 'All rights reserved.',
                details: 'View details',
                appStoreSmall: 'Download on the',
                appStore: 'App Store',
                macAppStore: 'Mac App Store',
                screenshot: 'Screenshot',
            }
        };

        /*
            APP DATA
            Cuando dupliques apps/_plantilla-app, dime "revisa apps y añade las nuevas".
            Yo leeré cada app.json y actualizaré este bloque para que la landing sea estática y rápida.
        */
        const APPS = [
            {
                slug: 'biodecay',
                title: {
                    es: 'BioDecay',
                    en: 'BioDecay'
                },
                subtitle: {
                    es: 'iOS',
                    en: 'iOS'
                },
                shortDescription: {
                    es: 'Motor farmacocinético de precisión para monitorizar biodisponibilidad, hidratación y suplementos mediante modelado dinámico y gráficas en tiempo real.',
                    en: 'Precision pharmacokinetic engine for tracking bioavailability, hydration and supplements through dynamic modeling and real-time charts.'
                },
                platforms: ['ios'],
                tags: {
                    es: ['BioHacking', 'Biométrica', 'Salud', 'Rendimiento'],
                    en: ['BioHacking', 'Biometrics', 'Health', 'Performance']
                },
                icon: 'apps/BioDecay/icon.png',
                page: 'apps/BioDecay/',
                links: {
                    appStore: 'https://apps.apple.com/us/app/biodecay/id6766216955',
                    macAppStore: ''
                },
                screenshots: {
                    es: [
                        'apps/BioDecay/ios/es/01.png',
                        'apps/BioDecay/ios/es/02.png',
                        'apps/BioDecay/ios/es/03.png'
                    ],
                    en: [
                        'apps/BioDecay/ios/en/01.PNG',
                        'apps/BioDecay/ios/en/02.png',
                        'apps/BioDecay/ios/en/03.PNG'
                    ]
                }
            },
            {
                slug: 'falken-writer',
                title: {
                    es: 'Falken Writer',
                    en: 'Falken Writer'
                },
                subtitle: {
                    es: 'iPadOS y macOS',
                    en: 'iPadOS and macOS'
                },
                shortDescription: {
                    es: 'Editor de texto retro para iPad y Mac con biblioteca, iCloud, RTF, Markdown, PDF y estética terminal retro.',
                    en: 'Retro text editor for iPad and Mac with library, iCloud, RTF, Markdown, PDF export, and tactical terminal aesthetics.'
                },
                platforms: ['ipados', 'macos'],
                tags: {
                    es: ['Productividad', 'Retro', 'Editor', 'Terminal', 'Código'],
                    en: ['Productivity', 'Retro', 'Editor', 'Terminal', 'Code']
                },
                icon: 'apps/Falken Writer/icon.png',
                page: 'apps/Falken%20Writer/',
                links: {
                    appStore: 'https://apps.apple.com/us/app/falken-writer/id6768220346',
                    macAppStore: 'https://apps.apple.com/us/app/falken-writer/id6768220346'
                },
                screenshots: {
                    es: [
                        'apps/Falken Writer/ipados/es/01.png',
                        'apps/Falken Writer/ipados/es/02.png',
                        'apps/Falken Writer/ipados/es/03.png'
                    ],
                    en: [
                        'apps/Falken Writer/ipados/en/01.png',
                        'apps/Falken Writer/ipados/en/02.png',
                        'apps/Falken Writer/ipados/en/03.png'
                    ]
                }
            }
        ];

        const platformLabel = {
            ios: 'iOS',
            ipados: 'iPadOS',
            macos: 'macOS'
        };

        const getSavedLanguage = () => {
            const saved = localStorage.getItem('takatoke-language');
            return LANGUAGES.includes(saved) ? saved : 'es';
        };

        const getText = (value, lang) => {
            if (typeof value === 'string') return value;
            return value?.[lang] || value?.es || value?.en || '';
        };

        const renderAppIcon = (app) => {
            if (app.icon) {
                return `<img src="${app.icon}" alt="" class="h-20 w-20 rounded-2xl object-cover shadow-sm">`;
            }

            return `
                <div class="flex h-20 w-20 shrink-0 items-center justify-center rounded-2xl bg-gradient-to-br from-slate-950 to-slate-600 text-white shadow-sm">
                    <i data-lucide="app-window" class="h-9 w-9"></i>
                </div>
            `;
        };

        const renderGallery = (app, lang) => {
            const shots = app.screenshots?.[lang] || app.screenshots?.es || [];

            if (shots.length > 0) {
                return shots.slice(0, 3).map((src, index) => `
                    <img src="${src}" alt="${COPY[lang].screenshot} ${index + 1} - ${getText(app.title, lang)}" class="${index === 1 ? 'translate-y-6 ' : ''}h-full min-h-[320px] w-full rounded-2xl border border-slate-200 bg-white object-cover shadow-sm">
                `).join('');
            }

            return [1, 2, 3].map((number, index) => `
                <div class="${index === 1 ? 'translate-y-6 ' : ''}flex min-h-[320px] items-center justify-center rounded-2xl border border-slate-200 bg-white text-sm font-medium text-slate-400">
                    ${COPY[lang].screenshot} ${number}
                </div>
            `).join('');
        };

        const renderStoreButtons = (app, lang) => {
            const buttons = [];

            if (app.links?.appStore) {
                buttons.push(`
                    <a href="${app.links.appStore}" class="inline-flex min-h-14 items-center justify-center gap-3 rounded-xl bg-black px-5 py-3 text-white transition hover:bg-slate-800" aria-label="${COPY[lang].appStore} - ${getText(app.title, lang)}">
                        <i data-lucide="apple" class="h-7 w-7"></i>
                        <span class="text-left leading-none">
                            <span class="block text-[10px] font-medium uppercase tracking-wide">${COPY[lang].appStoreSmall}</span>
                            <span class="mt-1 block text-lg font-semibold tracking-tight">${COPY[lang].appStore}</span>
                        </span>
                    </a>
                `);
            }

            if (app.links?.macAppStore) {
                buttons.push(`
                    <a href="${app.links.macAppStore}" class="inline-flex min-h-14 items-center justify-center gap-3 rounded-xl bg-black px-5 py-3 text-white transition hover:bg-slate-800" aria-label="${COPY[lang].macAppStore} - ${getText(app.title, lang)}">
                        <i data-lucide="monitor-down" class="h-7 w-7"></i>
                        <span class="text-left leading-none">
                            <span class="block text-[10px] font-medium uppercase tracking-wide">${COPY[lang].appStoreSmall}</span>
                            <span class="mt-1 block text-lg font-semibold tracking-tight">${COPY[lang].macAppStore}</span>
                        </span>
                    </a>
                `);
            }

            return buttons.join('');
        };

        const renderPortfolio = (lang) => {
            const portfolioGrid = document.querySelector('#portfolio-grid');

            portfolioGrid.innerHTML = APPS.map((app) => `
                <!-- App Card: ${app.slug} -->
                <article class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm transition hover:-translate-y-1 hover:shadow-soft">
                    <div class="grid gap-0 lg:grid-cols-[0.92fr_1.08fr]">
                        <div class="p-6 sm:p-8 lg:p-10">
                            <div class="flex items-center gap-4">
                                ${renderAppIcon(app)}

                                <div>
                                    <p class="text-sm font-medium text-slate-500">${getText(app.subtitle, lang)}</p>
                                    <h3 class="mt-1 text-2xl font-semibold tracking-tight text-slate-950">${getText(app.title, lang)}</h3>
                                </div>
                            </div>

                            <p class="mt-6 text-base leading-7 text-slate-600">${getText(app.shortDescription, lang)}</p>

                            <div class="mt-7 flex flex-wrap gap-2">
                                ${app.tags[lang].map((tag) => `<span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-600">${tag}</span>`).join('')}
                            </div>

                            <div class="mt-8 flex flex-col gap-3 sm:flex-row sm:flex-wrap">
                                ${renderStoreButtons(app, lang)}
                                <a href="${app.page}" class="inline-flex min-h-14 items-center justify-center gap-2 rounded-xl border border-slate-200 bg-white px-5 py-3 text-sm font-semibold text-slate-800 transition hover:border-slate-300 hover:bg-slate-50">
                                    ${COPY[lang].details}
                                    <i data-lucide="arrow-right" class="h-4 w-4"></i>
                                </a>
                            </div>
                        </div>

                        <div class="grid min-h-[360px] grid-cols-3 gap-3 bg-slate-100 p-4 sm:p-6">
                            ${renderGallery(app, lang)}
                        </div>
                    </div>
                </article>
            `).join('');
        };

        const applyLanguage = (lang) => {
            document.documentElement.lang = lang;
            localStorage.setItem('takatoke-language', lang);

            document.querySelectorAll('[data-i18n]').forEach((element) => {
                const key = element.dataset.i18n;
                element.textContent = COPY[lang][key];
            });

            document.querySelectorAll('.language-button').forEach((button) => {
                const isActive = button.dataset.lang === lang;
                button.classList.toggle('bg-white', isActive);
                button.classList.toggle('text-slate-950', isActive);
                button.classList.toggle('shadow-sm', isActive);
                button.classList.toggle('text-slate-500', !isActive);
            });

            renderPortfolio(lang);
            lucide.createIcons();
        };

        document.querySelectorAll('.language-button').forEach((button) => {
            button.addEventListener('click', () => applyLanguage(button.dataset.lang));
        });

        applyLanguage(getSavedLanguage());
    </script>
</body>
</html>
